<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>生命轴 - Life Timeline</title>
<style>
:root {
  --primary: #6366f1; --primary-dark: #4f46e5; --primary-light: rgba(99,102,241,0.15);
  --danger: #ef4444; --danger-dark: #dc2626;
  --gray-50: #f9fafb; --gray-100: #f3f4f6; --gray-200: #e5e7eb; --gray-300: #d1d5db;
  --gray-400: #9ca3af; --gray-500: #6b7280; --gray-600: #4b5563; --gray-700: #374151;
  --gray-800: #1f2937; --gray-900: #111827;
  --radius-sm: 6px; --radius-md: 10px; --radius-lg: 14px;
  --shadow-sm: 0 1px 3px rgba(0,0,0,.08); --shadow-md: 0 4px 16px rgba(0,0,0,.1);
  --shadow-lg: 0 8px 32px rgba(0,0,0,.15);
  --tl-left: 80px; --tl-line-left: 100px; --tl-dot-left: 86px;
  --tl-label-left: 116px; --tl-tick-left: 74px;
}
@media (max-width: 640px) {
  :root { --tl-left: 40px; --tl-line-left: 56px; --tl-dot-left: 42px; --tl-label-left: 66px; --tl-tick-left: 30px; }
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;background:var(--gray-50);color:var(--gray-800);min-height:100vh}
.app-header{background:linear-gradient(135deg,var(--primary) 0%,#8b5cf6 100%);color:#fff;padding:16px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:var(--shadow-md)}
.app-header h1{font-size:20px;font-weight:600;letter-spacing:1px}
.app-header .age-display{font-size:14px;opacity:.9;display:flex;align-items:center;gap:6px}
.app-header .age-display input{width:52px;padding:3px 8px;border:none;border-radius:var(--radius-sm);font-size:14px;text-align:center;background:rgba(255,255,255,.2);color:#fff;outline:none}
.sidebar-toggle{display:none;position:fixed;bottom:20px;right:20px;width:52px;height:52px;border-radius:50%;background:var(--primary);color:#fff;border:none;font-size:24px;cursor:pointer;box-shadow:var(--shadow-lg);z-index:99;transition:transform .2s,box-shadow .2s}.sidebar-toggle:hover{transform:scale(1.08);box-shadow:0 8px 24px rgba(99,102,241,.4)}.sidebar-toggle:active{transform:scale(.95)}
.app-body{display:flex;max-width:1200px;margin:0 auto;min-height:calc(100vh - 60px)}
.side-panel{width:340px;flex-shrink:0;background:#fff;border-right:1px solid var(--gray-200);padding:20px;overflow-y:auto;max-height:calc(100vh - 60px);transition:transform .3s,opacity .3s}
.side-panel h2{font-size:16px;margin-bottom:16px;color:var(--gray-700)}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:13px;color:var(--gray-600);margin-bottom:4px;font-weight:500}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:8px 10px;border:1px solid var(--gray-300);border-radius:var(--radius-sm);font-size:14px;font-family:inherit;transition:border-color .2s,box-shadow .2s}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--primary);outline:none;box-shadow:0 0 0 3px var(--primary-light)}
.form-group textarea{resize:vertical;min-height:60px}
.impact-row{display:flex;align-items:center;gap:10px}
.impact-row input[type=range]{flex:1}
.impact-row .impact-value{min-width:28px;text-align:center;font-weight:600;color:var(--primary)}
.btn{display:block;width:100%;padding:10px;border:none;border-radius:var(--radius-sm);font-size:15px;font-weight:500;cursor:pointer;transition:transform .15s,box-shadow .2s,background .2s}
.btn:active{transform:scale(.97)}.btn:focus-visible{outline:2px solid var(--primary);outline-offset:2px}
.btn-primary{background:var(--primary);color:#fff}.btn-primary:hover{background:var(--primary-dark);box-shadow:0 2px 8px rgba(99,102,241,.3)}
.btn-danger{background:var(--danger);color:#fff}.btn-danger:hover{background:var(--danger-dark)}
.btn-outline{background:transparent;border:1px solid var(--gray-300);color:var(--gray-600)}.btn-outline:hover{border-color:var(--primary);color:var(--primary);background:var(--primary-light)}
.btn-sm{padding:6px 12px;width:auto;display:inline-block;font-size:13px}
.timeline-area{flex:1;overflow-y:auto;max-height:calc(100vh - 60px);position:relative;background:#fff}
.timeline-container{position:relative;width:100%;padding:0 24px 0 var(--tl-left)}
.timeline-line{position:absolute;left:var(--tl-line-left);top:0;bottom:0;width:3px;background:var(--gray-200);border-radius:2px}
.stage-bar{position:absolute;left:calc(var(--tl-line-left) + 12px);width:8px;border-radius:4px;opacity:.45;z-index:1;transition:opacity .2s}.stage-bar:hover{opacity:.8}
.event-node{position:absolute;left:0;transform:translateY(-50%);z-index:10;cursor:pointer;display:flex;align-items:center;transition:transform .15s;animation:fadeInUp .35s ease-out both}
.event-node:hover{transform:translateY(-50%) scale(1.05)}
.event-circle{border-radius:50%;background:#fff;position:absolute;left:var(--tl-dot-left);z-index:11;transition:transform .2s,border-color .2s,box-shadow .2s;cursor:grab}.event-circle:active{cursor:grabbing;transform:scale(1.1)}
.event-label{margin-left:var(--tl-label-left);font-size:14px;line-height:1.5;pointer-events:none}
.event-label .event-title{font-weight:600;color:var(--gray-800)}
.event-label .event-age{font-size:12px;color:var(--gray-500);margin-left:6px}
.event-label .event-desc{font-size:12px;color:var(--gray-600);display:block;max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.age-tick{position:absolute;left:var(--tl-tick-left);font-size:11px;color:var(--gray-400);transform:translateY(-50%);z-index:0;pointer-events:none}
.age-tick::after{content:'';position:absolute;left:18px;top:50%;width:10px;height:1px;background:var(--gray-200)}
.drag-tooltip{position:fixed;pointer-events:none;z-index:100;background:var(--gray-800);color:#fff;padding:4px 10px;border-radius:var(--radius-sm);font-size:13px;font-weight:600;white-space:nowrap;transform:translate(-50%,-100%);margin-top:-10px}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:1000;align-items:center;justify-content:center;backdrop-filter:blur(2px)}
.modal-overlay.active{display:flex}
.modal{background:#fff;border-radius:var(--radius-lg);padding:24px;width:420px;max-width:90vw;box-shadow:var(--shadow-lg);max-height:80vh;overflow-y:auto}.modal h3{font-size:18px;margin-bottom:16px;color:var(--gray-800)}.modal .modal-actions{display:flex;gap:8px;margin-top:16px}.modal .modal-actions .btn{flex:1}
.timeline-toolbar{display:flex;gap:8px;padding:12px 24px;border-bottom:1px solid var(--gray-200);background:#fff;align-items:center;flex-wrap:wrap}.timeline-toolbar .spacer{flex:1}
.zoom-controls{display:flex;align-items:center;gap:4px}
.zoom-controls button{width:28px;height:28px;border:1px solid var(--gray-300);background:#fff;border-radius:var(--radius-sm);cursor:pointer;font-size:16px;transition:background .15s}.zoom-controls button:hover{background:var(--gray-100)}.zoom-controls .zoom-label{font-size:12px;color:var(--gray-500);min-width:36px;text-align:center}
.empty-state{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;color:var(--gray-400)}.empty-state .icon{font-size:48px;margin-bottom:12px}.empty-state p{font-size:14px}
.toast{position:fixed;bottom:24px;left:50%;padding:10px 20px;border-radius:var(--radius-md);font-size:14px;z-index:2000;opacity:0;pointer-events:none;transition:opacity .3s,transform .3s;transform:translateX(-50%) translateY(10px);background:var(--gray-800);color:#fff}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}.toast .toast-undo{margin-left:12px;padding:2px 10px;background:rgba(255,255,255,.15);border:none;border-radius:4px;color:#fff;cursor:pointer;font-size:13px}.toast .toast-undo:hover{background:rgba(255,255,255,.25)}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}@keyframes fadeInUp{from{opacity:0;transform:translateY(8px) translateY(-50%)}to{opacity:1;transform:translateY(-50%)}}@keyframes scaleIn{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:scale(1)}}
@media(max-width:768px){.app-body{flex-direction:column}.side-panel{width:100%;max-height:none;border-right:none;border-bottom:1px solid var(--gray-200)}.timeline-area{max-height:none}.sidebar-toggle{display:block}.side-panel.collapsed{display:none}}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:0s!important;transition-duration:0s!important}}
</style>
</head>
<body>

<header class="app-header">
  <h1>&#x1f5fa;&#xfe0f; 生命轴</h1>
  <div class="age-display">
    当前年龄：
    <input type="number" id="currentAgeInput" min="1" max="150" value="25" placeholder="年龄">
  </div>
</header>

<button class="sidebar-toggle" id="sidebarToggle" aria-label="切换表单面板">+</button>

<div class="app-body">

  <aside class="side-panel" id="sidePanel">
    <h2>&#x270f;&#xfe0f; 添加事件</h2>
    <div class="form-group">
      <label for="inputAge">年龄 *</label>
      <input type="number" id="inputAge" min="0" max="150" placeholder="例如 22">
    </div>
    <div class="form-group">
      <label for="inputTitle">标题 *</label>
      <input type="text" id="inputTitle" placeholder="例如 大学毕业">
    </div>
    <div class="form-group">
      <label for="inputDesc">描述</label>
      <textarea id="inputDesc" placeholder="记录更多的细节……"></textarea>
    </div>
    <div class="form-group">
      <label for="inputStage">人生阶段</label>
      <select id="inputStage">
        <option value="">-- 不选择 --</option>
        <option value="童年">&#x1f9f8; 童年</option>
        <option value="青春期">&#x1f3eb; 青春期</option>
        <option value="青年">&#x1f393; 青年</option>
        <option value="职场">&#x1f4bc; 职场</option>
        <option value="中年">&#x1f3e1; 中年</option>
        <option value="晚年">&#x1f305; 晚年</option>
      </select>
    </div>
    <div class="form-group">
      <label>影响力</label>
      <div class="impact-row">
        <input type="range" id="inputImpact" min="0" max="10" value="5">
        <span class="impact-value" id="impactValue">5</span>
      </div>
    </div>
    <button class="btn btn-primary" id="btnAddEvent">&#x2795; 添加到时间轴</button>
    <hr style="margin:16px 0;border:none;border-top:1px solid var(--gray-200);">
    <div style="display:flex;gap:8px;">
      <button class="btn btn-outline btn-sm" id="btnExportHTML" style="flex:1;">&#x1f4e4; 导出 HTML</button>
      <button class="btn btn-outline btn-sm" id="btnExportPDF" style="flex:1;">&#x1f4c4; 导出 PDF</button>
    </div>
    <div style="margin-top:8px;display:flex;gap:8px;">
      <button class="btn btn-outline btn-sm" id="btnImportFile" style="flex:1;">&#x1f4e5; 导入</button>
      <button class="btn btn-danger btn-sm" id="btnClearAll" style="flex:1;">&#x1f5d1;&#xfe0f; 清空</button>
    </div>
    <input type="file" id="fileInput" accept=".json,.html" style="display:none;">
    <p style="margin-top:12px;font-size:11px;color:var(--gray-400);text-align:center;">
      数据保存在浏览器本地
    </p>
  </aside>

  <main class="timeline-area" id="timelineArea">
    <div class="timeline-toolbar">
      <span style="font-size:13px;color:var(--gray-500);">共 <span id="eventCount">0</span> 个事件</span>
      <div class="spacer"></div>
      <div class="zoom-controls">
        <button id="zoomOut" title="缩小" aria-label="缩小">−</button>
        <span class="zoom-label" id="zoomLabel">1&times;</span>
        <button id="zoomIn" title="放大" aria-label="放大">+</button>
      </div>
    </div>
    <div class="timeline-container" id="timelineContainer">
      <div class="timeline-line"></div>
      <div id="emptyState" class="empty-state">
        <div class="icon">&#x1f331;</div>
        <p>你的人生还是一张白纸</p>
        <p style="font-size:12px;">在左侧填写第一个事件开始记录</p>
      </div>
      <div id="timelineContent"></div>
    </div>
  </main>
</div>

<div class="modal-overlay" id="modalOverlay" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
  <div class="modal">
    <h3 id="modalTitle">编辑事件</h3>
    <div class="form-group">
      <label for="modalAge">年龄</label>
      <input type="number" id="modalAge" min="0" max="150">
    </div>
    <div class="form-group">
      <label for="modalTitle">标题</label>
      <input type="text" id="modalTitle">
    </div>
    <div class="form-group">
      <label for="modalDesc">描述</label>
      <textarea id="modalDesc"></textarea>
    </div>
    <div class="form-group">
      <label for="modalStage">人生阶段</label>
      <select id="modalStage">
        <option value="">-- 不选择 --</option>
        <option value="童年">&#x1f9f8; 童年</option>
        <option value="青春期">&#x1f3eb; 青春期</option>
        <option value="青年">&#x1f393; 青年</option>
        <option value="职场">&#x1f4bc; 职场</option>
        <option value="中年">&#x1f3e1; 中年</option>
        <option value="晚年">&#x1f305; 晚年</option>
      </select>
    </div>
    <div class="form-group">
      <label>影响力</label>
      <div class="impact-row">
        <input type="range" id="modalImpact" min="0" max="10" value="5">
        <span class="impact-value" id="modalImpactValue">5</span>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-danger" id="btnDeleteEvent">&#x1f5d1;&#xfe0f; 删除</button>
      <button class="btn btn-primary" id="btnSaveEvent">&#x1f4be; 保存</button>
      <button class="btn btn-outline" id="btnCancelModal">取消</button>
    </div>
  </div>
</div>

<div class="toast" id="toast">
  <span id="toastMsg"></span>
  <button class="toast-undo" id="toastUndo" style="display:none;">撤销</button>
</div>

<script>
(function() {

// ===== Core Logic =====
var _idCounter = 0;
function generateId() {
  return 'evt_' + Date.now().toString(36) + '_' + (++_idCounter).toString(36);
}
function createEvent(opts) {
  opts = opts || {};
  if (opts.age === undefined || opts.age === null) throw new Error('age is required');
  if (!opts.title) throw new Error('title is required');
  if (typeof opts.age !== 'number' || opts.age < 0 || !Number.isFinite(opts.age)) {
    throw new Error('age must be a non-negative number');
  }
  if (opts.impact !== undefined) {
    if (typeof opts.impact !== 'number' || opts.impact < 0 || opts.impact > 10 || !Number.isInteger(opts.impact)) {
      throw new Error('impact must be an integer between 0 and 10');
    }
  }
  return { id: generateId(), age: opts.age, title: opts.title.trim(), description: opts.description || '', stage: opts.stage || '', impact: opts.impact !== undefined ? opts.impact : 0 };
}
function addEvent(events, event) { return events.concat([event]); }
function updateEvent(events, id, changes) {
  var idx = events.findIndex(function(e) { return e.id === id; });
  if (idx === -1) throw new Error('Event not found: ' + id);
  return events.slice(0, idx).concat([Object.assign({}, events[idx], changes)]).concat(events.slice(idx + 1));
}
function deleteEvent(events, id) {
  var idx = events.findIndex(function(e) { return e.id === id; });
  if (idx === -1) throw new Error('Event not found: ' + id);
  return events.slice(0, idx).concat(events.slice(idx + 1));
}
function inferStages(events) {
  var withStage = events.filter(function(e) { return e.stage; }).slice().sort(function(a, b) { return a.age - b.age; });
  if (withStage.length === 0) return [];
  var result = [];
  var prev = withStage[0];
  result.push({ stage: prev.stage, startAge: 0, endAge: prev.age });
  for (var i = 1; i < withStage.length; i++) {
    var curr = withStage[i];
    if (curr.stage === prev.stage) { result[result.length - 1].endAge = curr.age; }
    else { result.push({ stage: curr.stage, startAge: prev.age, endAge: curr.age }); }
    prev = curr;
  }
  return result;
}

// ===== Storage =====
var STORAGE_KEY = 'life-timeline-events';
function saveEvents(events) { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(events)); } catch(e) {} }
function loadEvents() { try { var raw = localStorage.getItem(STORAGE_KEY); return raw ? JSON.parse(raw) : []; } catch(e) { return []; } }

// ===== Layout =====
var PADDING_TOP = 60, PADDING_BOTTOM = 60, MIN_RADIUS = 6, MAX_RADIUS = 24, TICK_INTERVAL = 5;
var STAGE_COLORS = { '\u7ae5\u5e74': '#93C5FD', '\u9752\u6625\u671f': '#FCD34D', '\u9752\u5e74': '#6EE7B7', '\u804c\u573a': '#6366F1', '\u4e2d\u5e74': '#A78BFA', '\u665a\u5e74': '#FCA5A5' };
function getStageColor(stage) { return STAGE_COLORS[stage] || '#9CA3AF'; }

function calculateLayout(events, currentAge, containerHeight) {
  var sorted = events.slice().sort(function(a, b) { return a.age - b.age; });
  var usable = containerHeight - PADDING_TOP - PADDING_BOTTOM, range = Math.max(currentAge, 1);
  function ageToY(age) { return PADDING_TOP + (age / range) * usable; }
  function impactToRadius(impact) { var c = Math.max(0, Math.min(10, impact || 0)); return MIN_RADIUS + (c / 10) * (MAX_RADIUS - MIN_RADIUS); }
  var ticks = [];
  for (var a = 0; a <= currentAge; a += TICK_INTERVAL) ticks.push({ age: a, y: ageToY(a) });
  if (currentAge % TICK_INTERVAL !== 0) ticks.push({ age: currentAge, y: ageToY(currentAge) });
  var positionedEvents = sorted.map(function(e) { return { id: e.id, age: e.age, title: e.title, description: e.description, stage: e.stage, impact: e.impact, y: ageToY(e.age), radius: impactToRadius(e.impact) }; });
  var stages = inferStages(sorted).map(function(s) { return { stage: s.stage, color: getStageColor(s.stage), startAge: s.startAge, endAge: s.endAge, startY: ageToY(s.startAge), endY: ageToY(s.endAge) }; });
  return { events: positionedEvents, stages: stages, ticks: ticks, totalHeight: containerHeight };
}

// ===== App State =====
var currentEvents = [], currentAge = 25, zoomLevel = 1, BASE_HEIGHT = 1200, editingId = null;

function getTimelineHeight() {
  var h = Math.max(BASE_HEIGHT * zoomLevel, (document.getElementById('timelineContainer').clientHeight || 600));
  // Dynamic height based on event count
  var minH = Math.max(currentEvents.length * 60 + 200, 600);
  return Math.max(h, minH);
}

function escHtml(str) { var div = document.createElement('div'); div.textContent = str; return div.innerHTML; }

// ===== Toast =====
var toastTimer = null;
function showToast(msg, onUndo) {
  var el = document.getElementById('toast'), msgEl = document.getElementById('toastMsg'), undoBtn = document.getElementById('toastUndo');
  msgEl.textContent = msg; undoBtn.style.display = onUndo ? 'inline-block' : 'none';
  undoBtn.onclick = function() { clearTimeout(toastTimer); el.classList.remove('show'); if (onUndo) onUndo(); };
  el.classList.add('show');
  clearTimeout(toastTimer); toastTimer = setTimeout(function() { el.classList.remove('show'); }, 3000);
}

// ===== Render =====
var dragTooltip = null;
function createDragTooltip() {
  if (!dragTooltip) { dragTooltip = document.createElement('div'); dragTooltip.className = 'drag-tooltip'; dragTooltip.style.display = 'none'; document.body.appendChild(dragTooltip); }
  return dragTooltip;
}

function render(animating) {
  var height = getTimelineHeight();
  var layout = calculateLayout(currentEvents, currentAge, height);
  var container = document.getElementById('timelineContent'), empty = document.getElementById('emptyState');
  container.style.height = height + 'px'; container.style.position = 'relative';
  empty.style.display = currentEvents.length === 0 ? 'block' : 'none';
  while (container.firstChild) container.removeChild(container.firstChild);

  for (var si = 0; si < layout.stages.length; si++) {
    var s = layout.stages[si];
    var bar = document.createElement('div'); bar.className = 'stage-bar';
    bar.style.top = s.startY + 'px'; bar.style.height = Math.max(s.endY - s.startY, 4) + 'px';
    bar.style.background = s.color; bar.title = s.stage; container.appendChild(bar);
  }

  for (var ti = 0; ti < layout.ticks.length; ti++) {
    var t = layout.ticks[ti];
    var tick = document.createElement('div'); tick.className = 'age-tick';
    tick.style.top = t.y + 'px';
    tick.textContent = t.age + (t.age === currentAge ? ' \u5c81 (\u73b0\u5728)' : ' \u5c81');
    container.appendChild(tick);
  }

  for (var ei = 0; ei < layout.events.length; ei++) {
    var ev = layout.events[ei];
    var node = document.createElement('div'); node.className = 'event-node'; node.style.top = ev.y + 'px'; node.dataset.id = ev.id;
    if (!animating) node.style.animation = 'none';

    var circle = document.createElement('div'); circle.className = 'event-circle';
    circle.style.width = (ev.radius * 2) + 'px'; circle.style.height = (ev.radius * 2) + 'px';
    circle.style.marginLeft = (-ev.radius) + 'px';
    circle.style.border = '3px solid ' + (ev.stage ? getStageColor(ev.stage) : '#6366F1');
    circle.style.boxShadow = '0 0 0 2px rgba(255,255,255,.8), 0 2px 6px rgba(0,0,0,.12)';
    circle.title = '\u5f71\u54cd\u529b: ' + ev.impact + '/10';

    var label = document.createElement('div'); label.className = 'event-label';
    label.innerHTML = '<span class="event-title">' + escHtml(ev.title) + '</span><span class="event-age">' + ev.age + ' \u5c81</span>' + (ev.description ? '<span class="event-desc">' + escHtml(ev.description) + '</span>' : '');
    node.appendChild(circle); node.appendChild(label); container.appendChild(node);

    node.addEventListener('click', function(e) { e.stopPropagation(); openEditModal(this.dataset.id); });
    setupDrag(node, circle, ev);
  }
  document.getElementById('eventCount').textContent = currentEvents.length;
}

// ===== Drag =====
function setupDrag(node, circle, ev) {
  var dragging = false, startY = 0, startAge = 0, tip = createDragTooltip();
  function onDown(e) {
    dragging = true; startY = e.clientY || (e.touches && e.touches[0].clientY); startAge = ev.age;
    node.style.zIndex = 20; circle.style.cursor = 'grabbing';
    tip.style.display = 'block'; if (e.preventDefault) e.preventDefault();
  }
  function onMove(e) {
    if (!dragging) return;
    var clientY = e.clientY || (e.touches && e.touches[0].clientY);
    if (clientY === undefined) return;
    var dy = clientY - startY, height = getTimelineHeight(), usable = height - PADDING_TOP - PADDING_BOTTOM;
    var ageDelta = (dy / usable) * currentAge, newAge = Math.round(Math.max(0, Math.min(currentAge, startAge + ageDelta)));
    var y = PADDING_TOP + (newAge / currentAge) * usable;
    node.style.top = y + 'px';
    tip.textContent = newAge + ' \u5c81';
    tip.style.left = (e.clientX || 0) + 'px'; tip.style.top = (e.clientY || 0) + 'px';
  }
  function onUp(e) {
    if (!dragging) return; dragging = false; node.style.zIndex = 10; circle.style.cursor = 'grab'; tip.style.display = 'none';
    var clientY = e.clientY || (e.changedTouches && e.changedTouches[0].clientY);
    if (clientY === undefined) return;
    var dy = clientY - startY, height = getTimelineHeight(), usable = height - PADDING_TOP - PADDING_BOTTOM;
    var ageDelta = (dy / usable) * currentAge, newAge = Math.round(Math.max(0, Math.min(currentAge, startAge + ageDelta)));
    if (newAge !== startAge) {
      var prevEvents = currentEvents.slice();
      currentEvents = updateEvent(currentEvents, ev.id, { age: newAge }); saveEvents(currentEvents); render(true);
      showToast('\u5df2\u66f4\u65b0\u5e74\u9f84\u4e3a ' + newAge + ' \u5c81', function() { currentEvents = prevEvents; saveEvents(currentEvents); render(true); showToast('\u5df2\u64a4\u9500\u4fee\u6539'); });
    }
  }
  circle.addEventListener('mousedown', onDown); document.addEventListener('mousemove', onMove); document.addEventListener('mouseup', onUp);
  circle.addEventListener('touchstart', onDown, { passive: false }); document.addEventListener('touchmove', onMove, { passive: false }); document.addEventListener('touchend', onUp);
}

// ===== Modal =====
function openEditModal(id) {
  editingId = id; var ev = currentEvents.find(function(e) { return e.id === id; }); if (!ev) return;
  document.getElementById('modalAge').value = ev.age; document.getElementById('modalTitle').value = ev.title;
  document.getElementById('modalDesc').value = ev.description; document.getElementById('modalStage').value = ev.stage;
  document.getElementById('modalImpact').value = ev.impact; document.getElementById('modalImpactValue').textContent = ev.impact;
  document.getElementById('modalTitle').textContent = '\u7f16\u8f91\u4e8b\u4ef6';
  document.getElementById('modalOverlay').classList.add('active');
  document.body.style.overflow = 'hidden';
  // Focus first input
  setTimeout(function() { document.getElementById('modalAge').focus(); }, 100);
}
function closeModal() {
  document.getElementById('modalOverlay').classList.remove('active');
  document.body.style.overflow = '';
  editingId = null;
}

document.getElementById('modalImpact').addEventListener('input', function() { document.getElementById('modalImpactValue').textContent = this.value; });
document.getElementById('btnSaveEvent').addEventListener('click', function() {
  if (!editingId) return;
  var changes = { age: parseInt(document.getElementById('modalAge').value) || 0, title: document.getElementById('modalTitle').value.trim() || '\u672a\u547d\u540d', description: document.getElementById('modalDesc').value, stage: document.getElementById('modalStage').value, impact: parseInt(document.getElementById('modalImpact').value) || 0 };
  currentEvents = updateEvent(currentEvents, editingId, changes); saveEvents(currentEvents); render(true); closeModal(); showToast('\u5df2\u4fdd\u5b58\u4fee\u6539');
});
document.getElementById('btnDeleteEvent').addEventListener('click', function() { if (!editingId || !confirm('\u786e\u5b9a\u5220\u9664\u6b64\u4e8b\u4ef6\uff1f')) return; currentEvents = deleteEvent(currentEvents, editingId); saveEvents(currentEvents); render(true); closeModal(); showToast('\u5df2\u5220\u9664\u4e8b\u4ef6'); });
document.getElementById('btnCancelModal').addEventListener('click', closeModal);
document.getElementById('modalOverlay').addEventListener('click', function(e) { if (e.target === e.currentTarget) closeModal(); });
// Escape key to close modal
document.addEventListener('keydown', function(e) { if (e.key === 'Escape' && document.getElementById('modalOverlay').classList.contains('active')) closeModal(); });

// ===== Form =====
document.getElementById('inputImpact').addEventListener('input', function() { document.getElementById('impactValue').textContent = this.value; });
document.getElementById('btnAddEvent').addEventListener('click', function() {
  var age = parseInt(document.getElementById('inputAge').value), title = document.getElementById('inputTitle').value.trim();
  if (isNaN(age)) { showToast('\u8bf7\u8f93\u5165\u5e74\u9f84'); return; }
  if (!title) { showToast('\u8bf7\u8f93\u5165\u6807\u9898'); return; }
  try {
    var event = createEvent({ age: age, title: title, description: document.getElementById('inputDesc').value.trim(), stage: document.getElementById('inputStage').value, impact: parseInt(document.getElementById('inputImpact').value) || 0 });
    currentEvents = addEvent(currentEvents, event); saveEvents(currentEvents); render(true);
    document.getElementById('inputAge').value = ''; document.getElementById('inputTitle').value = ''; document.getElementById('inputDesc').value = ''; document.getElementById('inputStage').value = ''; document.getElementById('inputImpact').value = 5; document.getElementById('impactValue').textContent = '5';
    showToast('\u5df2\u6dfb\u52a0\uff1a\u300c' + title + '\u300d');
  } catch (err) { showToast(err.message); }
});
document.getElementById('inputTitle').addEventListener('keydown', function(e) { if (e.key === 'Enter') document.getElementById('btnAddEvent').click(); });

// ===== Age Input =====
document.getElementById('currentAgeInput').addEventListener('change', function() { var val = parseInt(this.value); if (val > 0 && val <= 150) { currentAge = val; render(true); } });

// ===== Zoom =====
document.getElementById('zoomIn').addEventListener('click', function() { zoomLevel = Math.min(4, zoomLevel * 1.5); document.getElementById('zoomLabel').textContent = zoomLevel.toFixed(1) + '\u00d7'; render(true); });
document.getElementById('zoomOut').addEventListener('click', function() { zoomLevel = Math.max(0.25, zoomLevel / 1.5); document.getElementById('zoomLabel').textContent = zoomLevel.toFixed(1) + '\u00d7'; render(true); });
document.getElementById('timelineArea').addEventListener('wheel', function(e) {
  if (e.ctrlKey || e.metaKey) { e.preventDefault(); if (e.deltaY < 0) { zoomLevel = Math.min(4, zoomLevel * 1.1); } else { zoomLevel = Math.max(0.25, zoomLevel / 1.1); } document.getElementById('zoomLabel').textContent = zoomLevel.toFixed(1) + '\u00d7'; render(true); }
}, { passive: false });

// ===== Sidebar Toggle (mobile) =====
document.getElementById('sidebarToggle').addEventListener('click', function() {
  var panel = document.getElementById('sidePanel');
  panel.classList.toggle('collapsed');
  this.textContent = panel.classList.contains('collapsed') ? '\u270f' : '+';
});

// ===== Export / Import =====
function downloadFile(content, filename, mimeType) {
  var blob = new Blob([content], { type: mimeType + ';charset=utf-8' }); var url = URL.createObjectURL(blob);
  var a = document.createElement('a'); a.href = url; a.download = filename; document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
}

function generateEditableHTML(data) {
  var items = data.events.slice().sort(function(a,b){return a.age-b.age;}), list = '';
  for (var i = 0; i < items.length; i++) {
    var e = items[i], st = e.stage ? ' <span style="font-size:12px;color:#888;">[' + escHtml(e.stage) + ']</span>' : '', desc = e.description ? '<div class="desc">' + escHtml(e.description) + '</div>' : '';
    list += '<div class="event"><span class="age">' + e.age + ' \u5c81</span><div class="info"><div class="title">' + escHtml(e.title) + st + '</div>' + desc + '</div><div class="impact">\u5f71\u54cd\u529b: ' + e.impact + '/10</div></div>';
  }
  var jsonStr = JSON.stringify(data).replace(/<\//g, '<\\/');
  return '<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>\u751f\u547d\u8f74 - \u5907\u4efd</title><style>body{font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;background:#f5f5f5;padding:20px;color:#333;max-width:800px;margin:0 auto;}h1{color:#6366f1;font-size:22px;}.meta{color:#888;font-size:13px;margin:8px 0 20px;}.event{background:#fff;border-radius:8px;padding:14px 18px;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.08);display:flex;align-items:center;gap:14px;}.event .age{background:#6366f1;color:#fff;border-radius:20px;padding:4px 12px;font-size:13px;font-weight:600;white-space:nowrap;}.event .info{flex:1;}.event .title{font-weight:600;font-size:15px;}.event .desc{font-size:13px;color:#888;margin-top:2px;}.event .impact{font-size:13px;color:#f0932b;}.footer{margin-top:24px;font-size:12px;color:#aaa;text-align:center;}</style></head><body><h1>\u751f\u547d\u8f74 - \u6570\u636e\u5907\u4efd</h1><div class="meta">\u5bfc\u51fa\u65f6\u95f4: ' + data.exportedAt + ' | \u5f53\u524d\u5e74\u9f84: ' + data.currentAge + ' \u5c81 | \u5171 ' + data.events.length + ' \u4e2a\u4e8b\u4ef6</div>' + list + '<div class="footer">\u7528 \u751f\u547d\u8f74 \u8bb0\u5f55 \u00b7 \u5bfc\u5165\u6b64\u6587\u4ef6\u53ef\u6062\u590d\u6570\u636e</div><script>window.__LIFELINE_DATA__ = ' + jsonStr + ';<\\/script></body></html>';
}

function generatePrintHTML(events, age) {
  var sorted = events.slice().sort(function(a,b){return a.age-b.age;}), list = '';
  for (var i = 0; i < sorted.length; i++) {
    var e = sorted[i], stageTag = e.stage ? '<div class="p-stage" style="background:' + getStageColor(e.stage) + '">' + escHtml(e.stage) + '</div>' : '', desc = e.description ? '<div class="p-desc">' + escHtml(e.description) + '</div>' : '';
    list += '<div class="p-event"><div class="p-dot" style="background:' + (e.stage ? getStageColor(e.stage) : '#6366f1') + ';border-color:' + (e.stage ? getStageColor(e.stage) : '#6366f1') + '"></div><div class="p-line"></div><div class="p-content"><div class="p-age">' + e.age + ' \u5c81</div><div class="p-title">' + escHtml(e.title) + '</div>' + desc + stageTag + '<div class="p-impact">\u5f71\u54cd\u529b: ' + e.impact + '/10</div></div></div>';
  }
  var stagesHtml = '', stages = inferStages(events);
  if (stages.length > 0) {
    var tags = '';
    for (var i = 0; i < stages.length; i++) tags += '<span class="p-stage-tag" style="background:' + getStageColor(stages[i].stage) + '">' + stages[i].stage + ' (' + stages[i].startAge + '-' + stages[i].endAge + ' \u5c81)</span>';
    stagesHtml = '<div class="p-stages"><strong>\u4eba\u751f\u9636\u6bb5</strong>' + tags + '</div>';
  }
  return '<!DOCTYPE html><html><head><meta charset="UTF-8"><title>\u751f\u547d\u8f74 - \u6253\u5370\u7248</title><style>body{font-family:-apple-system,"PingFang SC",sans-serif;max-width:600px;margin:0 auto;padding:40px 20px;color:#333;}h1{text-align:center;color:#6366f1;font-size:24px;margin-bottom:4px;}.sub{text-align:center;color:#888;font-size:14px;margin-bottom:32px;}.p-event{position:relative;padding-left:40px;margin-bottom:24px;}.p-dot{position:absolute;left:10px;top:6px;width:14px;height:14px;border-radius:50%;background:#6366f1;border:3px solid #6366f1;}.p-line{position:absolute;left:16px;top:20px;bottom:-24px;width:2px;background:#ddd;}.p-event:last-child .p-line{display:none;}.p-age{font-size:13px;font-weight:600;color:#6366f1;}.p-title{font-size:16px;font-weight:600;margin:2px 0;}.p-desc{font-size:13px;color:#666;margin:2px 0;}.p-stage{display:inline-block;font-size:11px;padding:2px 8px;border-radius:10px;color:#fff;margin:2px 0;}.p-impact{font-size:12px;color:#f0932b;}.p-stages{margin-top:32px;padding-top:16px;border-top:1px solid #eee;}.p-stages strong{display:block;margin-bottom:8px;font-size:14px;}.p-stage-tag{display:inline-block;padding:4px 10px;border-radius:12px;color:#fff;font-size:12px;margin:2px 4px 2px 0;}@media print{body{padding:20px;}.p-event{break-inside:avoid;}}</style></head><body><h1>\u751f\u547d\u8f74</h1><div class="sub">' + age + ' \u5c81\u7684\u4eba\u751f\u65c5\u9014 \u00b7 \u5171 ' + events.length + ' \u4e2a\u91cd\u8981\u4e8b\u4ef6</div>' + list + stagesHtml + '<div style="margin-top:40px;text-align:center;font-size:11px;color:#aaa;">\u7531 \u751f\u547d\u8f74 \u751f\u6210</div></body></html>';
}

document.getElementById('btnExportHTML').addEventListener('click', function() { var data = { version: 1, exportedAt: new Date().toISOString(), currentAge: currentAge, events: currentEvents }; downloadFile(generateEditableHTML(data), '\u751f\u547d\u8f74-' + new Date().toISOString().slice(0,10) + '.html', 'text/html'); showToast('\u5df2\u5bfc\u51fa\u53ef\u7f16\u8f91 HTML'); });
document.getElementById('btnExportPDF').addEventListener('click', function() { var pw = window.open('', '_blank'); pw.document.write(generatePrintHTML(currentEvents, currentAge)); pw.document.close(); pw.focus(); setTimeout(function() { pw.print(); }, 500); showToast('\u6253\u5f00\u6253\u5370\u89c6\u56fe\u2026'); });
document.getElementById('btnImportFile').addEventListener('click', function() { document.getElementById('fileInput').click(); });
document.getElementById('fileInput').addEventListener('change', function(e) {
  var file = e.target.files[0]; if (!file) return;
  var reader = new FileReader();
  reader.onload = function(ev) {
    try { var parsed = JSON.parse(ev.target.result); if (parsed.events && Array.isArray(parsed.events)) { importData(parsed); return; } } catch(e1) {}
    var match = ev.target.result.match(/window\.__LIFELINE_DATA__\s*=\s*(\{.+?\});/);
    if (match) { try { var parsed = JSON.parse(match[1]); if (parsed.events) { importData(parsed); return; } } catch(e2) {} }
    showToast('\u65e0\u6cd5\u8bc6\u522b\u7684\u6587\u4ef6\u683c\u5f0f');
  };
  reader.readAsText(file); e.target.value = '';
});
function importData(data) { currentEvents = data.events; if (data.currentAge) { currentAge = data.currentAge; document.getElementById('currentAgeInput').value = currentAge; } saveEvents(currentEvents); render(true); showToast('\u5df2\u5bfc\u5165 ' + currentEvents.length + ' \u4e2a\u4e8b\u4ef6'); }
document.getElementById('btnClearAll').addEventListener('click', function() {
  if (currentEvents.length === 0) return;
  if (!confirm('\u786e\u5b9a\u6e05\u7a7a\u6240\u6709\u4e8b\u4ef6\uff1f')) return;
  var prev = currentEvents; currentEvents = []; saveEvents(currentEvents); render(true); showToast('\u5df2\u6e05\u7a7a\u6240\u6709\u4e8b\u4ef6', function() { currentEvents = prev; saveEvents(currentEvents); render(true); showToast('\u5df2\u64a4\u9500\u6e05\u7a7a'); });
});

// ===== Init =====
function init() {
  currentEvents = loadEvents();
  var savedAge = localStorage.getItem('life-timeline-age');
  if (savedAge) { currentAge = parseInt(savedAge) || 25; document.getElementById('currentAgeInput').value = currentAge; }
  render(true);
}
document.getElementById('currentAgeInput').addEventListener('change', function() { localStorage.setItem('life-timeline-age', this.value); });
init();

})();
</script>
</body>
