<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>生命轴 - Life Timeline</title>
<style>
/* ===== Clean Design Tokens ===== */
:root {
  --primary: #3B82F6;
  --primary-dark: #2563EB;
  --primary-light: rgba(59,130,246,0.12);
  --danger: #EF4444;
  --success: #16A34A;
  --warning: #D97706;
  --surface: #FFFFFF;
  --surface-muted: #FDF6EC;
  --border: #E2E8F0;
  --text: #0F172A;
  --text-secondary: #64748B;
  --text-muted: #94A3B8;
  --radius-sm: 6px;
  --radius-md: 10px;
  --radius-lg: 16px;
  --shadow-sm: 0 1px 2px rgba(0,0,0,.05);
  --shadow-md: 0 4px 12px rgba(0,0,0,.07);
  --shadow-lg: 0 8px 30px rgba(0,0,0,.1);
  --font-sans: 'Inter', -apple-system, "PingFang SC", "Microsoft YaHei", "Noto Sans SC", sans-serif;
  --font-mono: "SF Mono", "Fira Code", "Consolas", monospace;
  --tl-left: 80px; --tl-line-left: 100px;
  --tl-label-left: 140px; --tl-tick-left: 74px;
}
@media (max-width: 640px) {
  :root { --tl-left: 40px; --tl-line-left: 56px; --tl-label-left: 84px; --tl-tick-left: 30px; }
}

/* ===== Inter Font ===== */
@font-face {
  font-family: 'Inter';
  src: url('src/fonts/inter.woff2') format('woff2');
  font-weight: 400 700;
  font-display: swap;
}

/* ===== Dot-Grid Texture (timeline area) ===== */
.timeline-area::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image: radial-gradient(circle, rgba(148,163,184,0.12) 1px, transparent 1px);
  background-size: 20px 20px;
  pointer-events: none;
  z-index: 0;
}
.timeline-container { position: relative; z-index: 1; }

/* ===== Reset & Base ===== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans);background:var(--surface-muted);color:var(--text);min-height:100vh;line-height:1.6;-webkit-font-smoothing:antialiased}

/* ===== Header ===== */
.app-header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.app-header h1{font-size:18px;font-weight:600;color:var(--text);letter-spacing:0.3px}
.app-header .age-display{font-size:13px;color:var(--text-secondary);display:flex;align-items:center;gap:8px}
.app-header .age-display input{width:56px;padding:4px 8px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:13px;text-align:center;background:var(--surface);color:var(--text);outline:none;transition:border-color .2s}
.app-header .age-display input:focus{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-light)}

/* ===== Sidebar Toggle (mobile) ===== */
.sidebar-toggle{display:none;position:fixed;bottom:24px;right:24px;width:48px;height:48px;border-radius:50%;background:var(--primary);color:#fff;border:none;font-size:20px;cursor:pointer;box-shadow:var(--shadow-lg);z-index:99;transition:transform .2s}.sidebar-toggle:hover{transform:scale(1.06)}.sidebar-toggle:active{transform:scale(.95)}

/* ===== Layout ===== */
.app-body{display:flex;max-width:1200px;margin:0 auto;min-height:calc(100vh - 53px)}

/* ===== Side Panel ===== */
.side-panel{width:320px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);padding:24px 20px;overflow-y:auto;max-height:calc(100vh - 53px)}
.side-panel h2{font-size:14px;font-weight:600;color:var(--text);margin-bottom:20px;letter-spacing:0.2px}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:12px;font-weight:500;color:var(--text-secondary);margin-bottom:5px;text-transform:uppercase;letter-spacing:0.5px}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:9px 11px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:14px;font-family:var(--font-sans);color:var(--text);background:var(--surface);transition:border-color .2s,box-shadow .2s}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--primary);outline:none;box-shadow:0 0 0 3px var(--primary-light)}
.form-group textarea{resize:vertical;min-height:56px;font-size:13px}
.form-group ::placeholder{color:var(--text-muted)}
.impact-row{display:flex;align-items:center;gap:12px}
.impact-row input[type=range]{flex:1;-webkit-appearance:none;appearance:none;height:4px;border-radius:2px;background:var(--border);outline:none}
.impact-row input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:var(--primary);cursor:pointer;border:2px solid #fff;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.impact-row .impact-value{min-width:26px;text-align:center;font-size:14px;font-weight:600;color:var(--primary);font-variant-numeric:tabular-nums}

/* ===== Buttons ===== */
.btn{display:block;width:100%;padding:10px 16px;border:none;border-radius:var(--radius-sm);font-size:14px;font-weight:500;font-family:var(--font-sans);cursor:pointer;transition:background .2s,box-shadow .2s,transform .1s}
.btn:active{transform:scale(.98)}
.btn:focus-visible{outline:2px solid var(--primary);outline-offset:2px}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:var(--primary-dark);box-shadow:0 2px 8px rgba(59,130,246,.3)}
.btn-danger{background:var(--danger);color:#fff}
.btn-danger:hover{background:#DC2626}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text-secondary)}
.btn-outline:hover{border-color:var(--primary);color:var(--primary);background:var(--primary-light)}
.btn-sm{padding:6px 12px;width:auto;display:inline-block;font-size:12px}

/* ===== Timeline ===== */
.timeline-area{flex:1;overflow-y:auto;max-height:calc(100vh - 53px);position:relative;background:var(--surface)}
.timeline-container{position:relative;width:100%;padding:0 32px 0 var(--tl-left)}
.timeline-line{position:absolute;left:var(--tl-line-left);top:0;bottom:0;width:2px;background:var(--border);z-index:2}

/* ===== Stage Bars ===== */
.stage-bar{position:absolute;left:var(--tl-line-left);width:3px;border-radius:2px;opacity:.15;z-index:0;pointer-events:none}

/* ===== Event Nodes ===== */
.event-node{position:absolute;left:0;transform:translateY(-50%);z-index:10;cursor:pointer;display:flex;align-items:center;animation:fadeInUp .35s ease-out both}
.event-node:hover{transform:translateY(-50%) scale(1.03);z-index:11}

.event-circle{border-radius:50%;position:absolute;left:var(--tl-line-left);transform:translateX(-50%);z-index:11;transition:transform .2s,border-color .2s,box-shadow .2s;cursor:grab}
.event-circle:active{cursor:grabbing;transform:translateX(-50%) scale(1.15)}

/* ===== Event Labels ===== */
.event-label{margin-left:var(--tl-label-left);padding:6px 12px 6px 16px;background:rgba(248,250,252,0.85);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border:1px solid var(--border);border-left:3px solid transparent;border-radius:var(--radius-md);font-size:13px;line-height:1.5;pointer-events:none;transition:box-shadow .2s,border-color .2s}
.event-node:hover .event-label{box-shadow:0 4px 16px rgba(0,0,0,0.06)}
.event-label .event-title{font-weight:600;color:var(--text);font-size:14px}
.event-label .event-age{font-size:11px;color:var(--text-muted);margin-left:8px;font-weight:500;white-space:nowrap}
.event-label .event-desc{font-size:12px;color:var(--text-secondary);display:block;margin-top:2px}

/* ===== Age Ticks ===== */
.age-tick{position:absolute;left:var(--tl-tick-left);font-size:11px;color:var(--text-muted);transform:translateY(-50%);z-index:0;pointer-events:none;font-variant-numeric:tabular-nums}
.age-tick::after{content:'';position:absolute;left:calc(100% + 6px);top:50%;width:6px;height:1px;background:var(--border);opacity:.4;transform:translateY(-50%)}

/* ===== Drag Tooltip ===== */
.drag-tooltip{position:fixed;pointer-events:none;z-index:100;background:var(--text);color:#fff;padding:4px 10px;border-radius:var(--radius-sm);font-size:12px;font-weight:500;white-space:nowrap;transform:translate(-50%,-100%);margin-top:-10px;font-variant-numeric:tabular-nums}

/* ===== Modal ===== */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(15,23,42,.5);z-index:1000;align-items:center;justify-content:center;backdrop-filter:blur(4px);animation:fadeIn .2s ease}
.modal-overlay.active{display:flex}
.modal{background:var(--surface);border-radius:var(--radius-lg);padding:28px;width:440px;max-width:92vw;box-shadow:var(--shadow-lg);max-height:85vh;overflow-y:auto;animation:scaleIn .2s ease}
.modal h3{font-size:16px;font-weight:600;color:var(--text);margin-bottom:20px}
.modal .modal-actions{display:flex;gap:10px;margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}
.modal .modal-actions .btn{flex:1}

/* ===== Toolbar ===== */
.timeline-toolbar{display:flex;gap:8px;padding:10px 24px;border-bottom:1px solid var(--border);background:var(--surface);align-items:center;flex-wrap:wrap}
.timeline-toolbar .spacer{flex:1}
.zoom-controls{display:flex;align-items:center;gap:4px}
.zoom-controls button{width:28px;height:28px;border:1px solid var(--border);background:var(--surface);border-radius:var(--radius-sm);cursor:pointer;font-size:16px;color:var(--text-secondary);transition:background .15s,color .15s;display:flex;align-items:center;justify-content:center}
.zoom-controls button:hover{background:var(--surface-muted);color:var(--text)}
.zoom-controls .zoom-label{font-size:11px;color:var(--text-muted);min-width:36px;text-align:center;font-variant-numeric:tabular-nums}

/* ===== Empty State ===== */
.empty-state{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;color:var(--text-muted)}
.empty-state .icon{font-size:40px;margin-bottom:12px;opacity:.6}
.empty-state p{font-size:13px;line-height:1.8}
.empty-state p:first-of-type{font-weight:500;color:var(--text-secondary)}

/* ===== Toast ===== */
.toast{position:fixed;bottom:24px;left:50%;padding:10px 20px;border-radius:var(--radius-md);font-size:13px;z-index:2000;opacity:0;pointer-events:none;transition:opacity .3s,transform .3s;transform:translateX(-50%) translateY(10px);background:var(--text);color:#fff;box-shadow:var(--shadow-lg)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast .toast-undo{margin-left:12px;padding:3px 10px;background:rgba(255,255,255,.12);border:none;border-radius:4px;color:#fff;cursor:pointer;font-size:12px;transition:background .15s}
.toast .toast-undo:hover{background:rgba(255,255,255,.2)}

/* ===== Section Divider ===== */
.section-divider{margin:20px 0 16px;border:none;border-top:1px solid var(--border)}

/* ===== Animations ===== */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes fadeInUp{from{opacity:0;transform:translateY(8px) translateY(-50%)}to{opacity:1;transform:translateY(-50%)}}
@keyframes scaleIn{from{opacity:0;transform:scale(.94)}to{opacity:1;transform:scale(1)}}

/* ===== Responsive ===== */
@media(max-width:768px){
  .app-body{flex-direction:column}
  .side-panel{width:100%;max-height:none;border-right:none;border-bottom:1px solid var(--border)}
  .timeline-area{max-height:none}
  .sidebar-toggle{display:flex;align-items:center;justify-content:center}
  .side-panel.collapsed{display:none}
}
@media(prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:0s!important;transition-duration:0s!important}
}

/* ===== Bottom Sheet (mobile) ===== */
@media (max-width: 768px) {
  .bs-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(15,23,42,0.4);
    z-index: 999;
    backdrop-filter: blur(2px);
  }
  .bs-overlay.active { display: block; }

  .bottom-sheet {
    position: fixed;
    left: 0;
    right: 0;
    bottom: 0;
    background: var(--surface);
    border-radius: 16px 16px 0 0;
    z-index: 1000;
    transform: translateY(100%);
    transition: transform 0.3s ease;
    max-height: 70vh;
    overflow-y: auto;
    box-shadow: 0 -4px 24px rgba(0,0,0,0.12);
    -webkit-overflow-scrolling: touch;
  }
  .bottom-sheet.active {
    transform: translateY(0);
  }

  .bs-handle {
    width: 36px;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 8px auto;
  }

  .bs-content {
    padding: 0 20px 24px;
  }
}

/* ===== Modal → Bottom Sheet (mobile) ===== */
@media (max-width: 768px) {
  .modal-overlay.active {
    align-items: flex-end;
    padding: 0;
  }
  .modal {
    width: 100%;
    max-width: 100%;
    border-radius: 16px 16px 0 0;
    max-height: 75vh;
    margin: 0;
    animation: slideUp 0.25s ease;
    padding: 20px;
  }
}

/* ===== Touch & Timeline (mobile) ===== */
@media (max-width: 768px) {
  /* Touch target expansion for event circles */
  .event-circle::before {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 44px;
    height: 44px;
    border-radius: 50%;
  }

  /* Smaller labels */
  .event-label {
    font-size: 12px;
    padding: 4px 12px 4px 13px;
    backdrop-filter: none;
    -webkit-backdrop-filter: none;
    background: var(--surface-muted);
  }
  .event-label .event-title {
    font-size: 13px;
  }
  .event-label .event-age {
    font-size: 10px;
  }

  /* Smaller ticks */
  .age-tick {
    font-size: 10px;
  }

  /* Larger drag tooltip */
  .drag-tooltip {
    font-size: 14px;
    padding: 6px 14px;
  }

  /* More prominent FAB */
  .sidebar-toggle {
    width: 56px;
    height: 56px;
    font-size: 24px;
    bottom: 28px;
    right: 28px;
  }
}

/* ===== Slide Up Animation ===== */
@keyframes slideUp {
  from { transform: translateY(100%); }
  to   { transform: translateY(0); }
}
</style>
<link rel="preconnect" href="https://unpkg.com">
<script src="https://unpkg.com/lucide@0.468.0/dist/umd/lucide.min.js" defer></script>
</head>
<body>

<header class="app-header">
  <h1><i data-lucide="map" style="vertical-align:middle;"></i> 生命轴</h1>
  <div class="age-display">
    当前年龄
    <input type="number" id="currentAgeInput" min="1" max="150" value="25" placeholder="年龄">
  </div>
</header>

<button class="sidebar-toggle" id="sidebarToggle" aria-label="切换表单面板"><i data-lucide="plus"></i></button>

<div class="app-body">

  <aside class="side-panel" id="sidePanel">
    <h2><i data-lucide="pen-square"></i> 添加事件</h2>
    <div class="form-group">
      <label for="inputAge">年龄</label>
      <input type="number" id="inputAge" min="0" max="150" placeholder="例如 22">
    </div>
    <div class="form-group">
      <label for="inputTitle">标题</label>
      <input type="text" id="inputTitle" placeholder="例如 大学毕业">
    </div>
    <div class="form-group">
      <label for="inputDesc">描述</label>
      <textarea id="inputDesc" placeholder="记录更多的细节…"></textarea>
    </div>
    <div class="form-group">
      <label for="inputStage">人生阶段</label>
      <select id="inputStage">
        <option value="">-- 不选择 --</option>
        <option value="童年">童年</option>
        <option value="青春期">青春期</option>
        <option value="青年">青年</option>
        <option value="职场">职场</option>
        <option value="中年">中年</option>
        <option value="晚年">晚年</option>
      </select>
    </div>
    <div class="form-group">
      <label>影响力</label>
      <div class="impact-row">
        <input type="range" id="inputImpact" min="0" max="10" value="5">
        <span class="impact-value" id="impactValue">5</span>
      </div>
    </div>
    <button class="btn btn-primary" id="btnAddEvent"><i data-lucide="plus"></i> 添加到时间轴</button>

    <hr class="section-divider">

    <div style="display:flex;gap:8px;">
      <button class="btn btn-outline btn-sm" id="btnExportHTML" style="flex:1;"><i data-lucide="upload"></i> 导出 HTML</button>
      <button class="btn btn-outline btn-sm" id="btnExportPDF" style="flex:1;"><i data-lucide="file-text"></i> 导出 PDF</button>
    </div>
    <div style="margin-top:8px;display:flex;gap:8px;">
      <button class="btn btn-outline btn-sm" id="btnImportFile" style="flex:1;"><i data-lucide="download"></i> 导入</button>
      <button class="btn btn-danger btn-sm" id="btnClearAll" style="flex:1;"><i data-lucide="trash-2"></i> 清空</button>
    </div>
    <input type="file" id="fileInput" accept=".json,.html" style="display:none;">
    <p style="margin-top:16px;font-size:11px;color:var(--text-muted);text-align:center;">
      数据保存在浏览器本地
    </p>
  </aside>

  <main class="timeline-area" id="timelineArea">
    <div class="timeline-toolbar">
      <span style="font-size:12px;color:var(--text-secondary);">共 <span id="eventCount">0</span> 个事件</span>
      <div class="spacer"></div>
      <div class="zoom-controls">
        <button id="zoomOut" title="缩小" aria-label="缩小">−</button>
        <span class="zoom-label" id="zoomLabel">1&times;</span>
        <button id="zoomIn" title="放大" aria-label="放大">+</button>
      </div>
    </div>
    <div class="timeline-container" id="timelineContainer">
      <div class="timeline-line"></div>
      <div id="emptyState" class="empty-state">
        <div class="icon"><i data-lucide="sprout" style="width:40px;height:40px;stroke-width:1.5;"></i></div>
        <p>你的人生还是一张白纸</p>
        <p style="font-size:12px;">在左侧填写第一个事件开始记录</p>
      </div>
      <div id="timelineContent"></div>
    </div>
  </main>
</div>

<div class="modal-overlay" id="modalOverlay" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
  <div class="modal">
    <h3 id="modalTitle">编辑事件</h3>
    <div class="form-group">
      <label for="modalAge">年龄</label>
      <input type="number" id="modalAge" min="0" max="150">
    </div>
    <div class="form-group">
      <label for="modalTitle">标题</label>
      <input type="text" id="modalTitle">
    </div>
    <div class="form-group">
      <label for="modalDesc">描述</label>
      <textarea id="modalDesc"></textarea>
    </div>
    <div class="form-group">
      <label for="modalStage">人生阶段</label>
      <select id="modalStage">
        <option value="">-- 不选择 --</option>
        <option value="童年">童年</option>
        <option value="青春期">青春期</option>
        <option value="青年">青年</option>
        <option value="职场">职场</option>
        <option value="中年">中年</option>
        <option value="晚年">晚年</option>
      </select>
    </div>
    <div class="form-group">
      <label>影响力</label>
      <div class="impact-row">
        <input type="range" id="modalImpact" min="0" max="10" value="5">
        <span class="impact-value" id="modalImpactValue">5</span>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-danger" id="btnDeleteEvent"><i data-lucide="trash-2"></i> 删除</button>
      <button class="btn btn-primary" id="btnSaveEvent"><i data-lucide="save"></i> 保存</button>
      <button class="btn btn-outline" id="btnCancelModal">取消</button>
    </div>
  </div>
</div>

<div class="toast" id="toast">
  <span id="toastMsg"></span>
  <button class="toast-undo" id="toastUndo" style="display:none;">撤销</button>
</div>

<!-- Bottom Sheet Overlay (mobile) -->
<div class="bs-overlay" id="bsOverlay"></div>

<!-- Add Event Bottom Sheet (mobile) -->
<div class="bottom-sheet" id="bsAdd">
  <div class="bs-handle"></div>
  <div class="bs-content">
    <h3 style="font-size:16px;font-weight:600;margin-bottom:16px;"><i data-lucide="pen-square"></i> 添加事件</h3>
    <div class="form-group">
      <label for="bsInputAge">年龄</label>
      <input type="number" id="bsInputAge" min="0" max="150" placeholder="例如 22">
    </div>
    <div class="form-group">
      <label for="bsInputTitle">标题</label>
      <input type="text" id="bsInputTitle" placeholder="例如 大学毕业">
    </div>
    <div class="form-group">
      <label for="bsInputDesc">描述</label>
      <textarea id="bsInputDesc" placeholder="记录更多的细节…"></textarea>
    </div>
    <div class="form-group">
      <label for="bsInputStage">人生阶段</label>
      <select id="bsInputStage">
        <option value="">-- 不选择 --</option>
        <option value="童年">童年</option>
        <option value="青春期">青春期</option>
        <option value="青年">青年</option>
        <option value="职场">职场</option>
        <option value="中年">中年</option>
        <option value="晚年">晚年</option>
      </select>
    </div>
    <div class="form-group">
      <label>影响力</label>
      <div class="impact-row">
        <input type="range" id="bsInputImpact" min="0" max="10" value="5">
        <span class="impact-value" id="bsImpactValue">5</span>
      </div>
    </div>
    <button class="btn btn-primary" id="bsBtnAdd"><i data-lucide="plus"></i> 添加到时间轴</button>
  </div>
</div>

<script type="module" src="src/app.mjs"></script>
</body>
</html>
